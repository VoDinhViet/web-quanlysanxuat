# Nixpacks config for the production build, mirroring Dockerfile/server.mjs:
# `pnpm build` emits dist/client (static assets) + dist/server/server.js (the
# SSR fetch handler). server.mjs serves dist/client directly and forwards
# everything else to that handler — see server.mjs for details.
#
# pnpm is pinned via corepack (not a nix package) to match the lockfile version
# used elsewhere in this repo (see Dockerfile).
#
# NODE_ENV is set only on the start command, not as a global [variables] entry:
# pnpm skips devDependencies when NODE_ENV=production during install, and vite
# (a devDependency) is required to run `pnpm build`.
#
# Required platform env vars (set in the platform's dashboard, not here):
#   VITE_API_URL   - public API base URL, inlined into the client bundle at
#                    build time, so it must be set before/during the build.
#   SESSION_SECRET - server-only, signs the session cookie, required at runtime.

[phases.setup]
nixPkgs = ["nodejs_24"]

[phases.install]
cmds = [
  "corepack enable",
  "corepack prepare pnpm@11.4.0 --activate",
  "pnpm install --frozen-lockfile --prefer-offline",
]

[phases.build]
cmds = ["pnpm build"]

[start]
cmd = "NODE_ENV=production node server.mjs"
